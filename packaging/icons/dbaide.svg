<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Three concentric arcs in alternating rotation, graphite gradient. The
       single mark on a transparent canvas — geometric, restrained, with a
       little internal variation via the gradient + per-arc opacity. -->
  <defs>
    <!-- Polished-graphite gradient: silver highlight → deep graphite. Brighter
         than pure slate so the mark stays readable on the near-black dark theme,
         while still reading as "石墨色" on light backgrounds. -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cbd5e1"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#g)" stroke-linecap="round">
    <path d="M 512 192 A 320 320 0 1 1 192 512" stroke-width="58"/>
    <path d="M 512 304 A 208 208 0 1 0 720 512" stroke-width="50" opacity="0.85"/>
    <path d="M 512 392 A 120 120 0 1 1 392 512" stroke-width="42" opacity="0.65"/>
  </g>
</svg>
