<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- 简约 · 大气 — one mark, nothing else.
       A single four-point sparkle (the modern AI symbol) on a transparent canvas.
       The database identity lives in the app name; the icon doesn't need to
       depict the product literally. Soft quadratic-curve concavity gives the
       form its "elegant" rather than "spiky" character. -->
  <defs>
    <linearGradient id="g" x1="0.25" y1="0.1" x2="0.75" y2="0.9">
      <stop offset="0" stop-color="#7eb1ff"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <path d="M512 80
           Q548 444 596 472
           Q628 488 944 512
           Q628 536 596 552
           Q548 580 512 944
           Q476 580 428 552
           Q396 536 80 512
           Q396 488 428 472
           Q476 444 512 80 Z"
        fill="url(#g)"/>
</svg>
