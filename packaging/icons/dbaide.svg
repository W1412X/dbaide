<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Transparent background by design: the mark sits on whatever surface the app
       paints (dock, header, taskbar, light theme, dark theme) without a baked-in
       tile that clashes with the host colour. -->

  <!-- Database mark in a single brand blue. Top disk is FILLED (the "data" entering
       the store); body is STROKED (the container) — same shape language as before
       but resolved to one solid colour so it reads on any background. -->
  <g fill="none" stroke="#3b82f6" stroke-width="72" stroke-linecap="round" stroke-linejoin="round">
    <!-- Sides + bottom curve -->
    <path d="M264 332 V692 a248 88 0 0 0 496 0 V332"/>
    <!-- Horizontal data bands -->
    <path d="M264 460 a248 88 0 0 0 496 0"/>
    <path d="M264 580 a248 88 0 0 0 496 0"/>
  </g>
  <!-- Top disk: solid fill so the "data in" reads strongly even at small sizes
       (a stroked ellipse vanishes at 16–32 px). -->
  <ellipse cx="512" cy="332" rx="248" ry="88" fill="#3b82f6"/>
</svg>
