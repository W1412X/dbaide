name: Build & Release

# Builds the desktop app on macOS, Linux and Windows. Pushing a tag like `v1.2.3`
# also publishes a GitHub Release with the bundles attached. `workflow_dispatch`
# builds the artifacts without releasing (handy for testing).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: DBAide-macOS-arm64
          - os: ubuntu-22.04
            artifact: DBAide-Linux-x86_64
          - os: windows-latest
            artifact: DBAide-Windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,dev]"

      - name: Build desktop bundle (PyInstaller)
        run: python -m PyInstaller packaging/pyinstaller/dbaide-gui.spec --noconfirm --clean

      - name: Package (macOS → .dmg)
        if: runner.os == 'macOS'
        working-directory: dist
        run: hdiutil create -volname DBAide -srcfolder DBAide -ov -format UDZO "${{ matrix.artifact }}.dmg"

      - name: Package (Linux → .tar.gz)
        if: runner.os == 'Linux'
        working-directory: dist
        run: tar -czf "${{ matrix.artifact }}.tar.gz" DBAide

      - name: Package (Windows → .zip)
        if: runner.os == 'Windows'
        working-directory: dist
        run: Compress-Archive -Path DBAide -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
