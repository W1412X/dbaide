name: Build & Release

# Builds native installers for macOS (.dmg, drag-to-Applications), Windows (.msi
# wizard) and Linux (.tar.gz). Pushing a tag like `v1.2.3` also publishes a GitHub
# Release with the installers attached. `workflow_dispatch` builds without releasing.
#
# NOTE: `feat/installers` is a temporary branch trigger for iterating on the
# installer steps — pushes there build (no release). Remove it before merging.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - feat/installers

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: DBAide-macOS-arm64
          - os: ubuntu-22.04
            artifact: DBAide-Linux-x86_64
          - os: windows-latest
            artifact: DBAide-Windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          case "$ver" in [0-9]*) ;; *) ver="0.0.0" ;; esac   # branch builds → 0.0.0
          echo "DBAIDE_VERSION=$ver" >> "$GITHUB_ENV"
          echo "MSI_VERSION=${ver%%-*}" >> "$GITHUB_ENV"      # MSI needs numeric x.y.z

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,dev]"

      - name: Build desktop bundle (PyInstaller)
        run: python -m PyInstaller packaging/pyinstaller/dbaide-gui.spec --noconfirm --clean

      # macOS → a .dmg containing DBAide.app + an Applications symlink, so users
      # drag the app into Applications.
      - name: Package (macOS → drag-install .dmg)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmgroot
          cp -R dist/DBAide.app dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname DBAide -srcfolder dmgroot -ov -format UDZO "dist/${{ matrix.artifact }}.dmg"

      - name: Package (Linux → .tar.gz)
        if: runner.os == 'Linux'
        working-directory: dist
        run: tar -czf "${{ matrix.artifact }}.tar.gz" DBAide

      # Windows → an MSI installer wizard (WiX v4 auto-harvests the PyInstaller folder).
      - name: Package (Windows → .msi)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.5
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          wix extension add -g WixToolset.UI.wixext
          wix build -arch x64 -ext WixToolset.UI.wixext -d Version=$env:MSI_VERSION `
            packaging\windows\DBAide.wxs -o "dist\${{ matrix.artifact }}.msi"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.tar.gz
            dist/*.msi
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
