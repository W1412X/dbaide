name: Build & Release

# Builds native installers for macOS (.dmg, drag-to-Applications), Windows (.msi
# wizard) and Linux (.tar.gz). Pushing a tag like `v1.2.3` also publishes a GitHub
# Release with the installers attached. `workflow_dispatch` builds without releasing.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: DBAide-macOS-arm64
          - os: ubuntu-22.04
            artifact: DBAide-Linux-x86_64
          - os: windows-latest
            artifact: DBAide-Windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          case "$ver" in [0-9]*) ;; *) ver="0.0.0" ;; esac   # branch builds → 0.0.0
          echo "DBAIDE_VERSION=$ver" >> "$GITHUB_ENV"
          echo "MSI_VERSION=${ver%%-*}" >> "$GITHUB_ENV"      # MSI needs numeric x.y.z

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,dev]"

      - name: Build desktop bundle (PyInstaller)
        run: python -m PyInstaller packaging/pyinstaller/dbaide-gui.spec --noconfirm --clean

      # Catch a broken/over-trimmed bundle before we ship it: launch the real binary
      # headlessly (xvfb → the actual xcb platform plugin). A missing Qt module would
      # crash immediately; a healthy app runs until the timeout kills it (code 124).
      - name: Smoke test (Linux — does it launch?)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 >/dev/null 2>&1 || true
          echo "bundle size:"; du -sh dist/DBAide
          set +e
          xvfb-run -a timeout 30 dist/DBAide/DBAide >smoke.log 2>&1
          code=$?
          echo "--- app output ---"; cat smoke.log; echo "--- exit: $code ---"
          # 0 = launched and exited cleanly; 124 = still running when timeout killed
          # it. Both mean it started without a missing-module / plugin crash.
          if [ "$code" = "0" ] || [ "$code" = "124" ]; then echo "✓ healthy"; exit 0; fi
          echo "✗ startup crash (exit $code)"; exit 1

      # macOS → a .dmg containing DBAide.app + an Applications symlink, so users
      # drag the app into Applications.
      - name: Package (macOS → drag-install .dmg)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mkdir -p dmgroot
          cp -R dist/DBAide.app dmgroot/
          ln -s /Applications dmgroot/Applications
          out="dist/${{ matrix.artifact }}.dmg"
          # hdiutil intermittently fails with "Resource busy" on CI runners — retry.
          for attempt in 1 2 3 4 5; do
            if hdiutil create -volname DBAide -srcfolder dmgroot -ov -format UDZO "$out"; then
              break
            fi
            echo "hdiutil failed (attempt $attempt) — retrying in 8s…"
            sleep 8
          done
          test -f "$out"

      - name: Package (Linux → .tar.gz)
        if: runner.os == 'Linux'
        working-directory: dist
        run: tar -czf "${{ matrix.artifact }}.tar.gz" DBAide

      # Windows → an MSI installer wizard (WiX v4 auto-harvests the PyInstaller folder).
      - name: Package (Windows → .msi)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          wix --version
          wix extension add -g WixToolset.UI.wixext/5.0.2
          (Get-Content packaging\windows\DBAide.wxs -Raw) -replace '__DBAIDE_VERSION__', $env:MSI_VERSION |
            Set-Content -Encoding utf8 DBAide.gen.wxs
          wix build -arch x64 -ext WixToolset.UI.wixext DBAide.gen.wxs -o "dist\${{ matrix.artifact }}.msi"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.tar.gz
            dist/*.msi
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
